name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  dashboard:
    name: Dashboard (build + lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  runbooks:
    name: Runbooks (PSScriptAnalyzer)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
          $results = Invoke-ScriptAnalyzer -Path ./runbooks -Recurse -Settings @{
            Severity = @('Error', 'Warning')
            ExcludeRules = @('PSUseShouldProcessForStateChangingFunctions')
          }
          $results | Format-Table -AutoSize
          if ($results | Where-Object Severity -eq 'Error') {
            Write-Error "PSScriptAnalyzer found errors"
            exit 1
          }

  infrastructure:
    name: Infrastructure (Bicep validate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: az bicep build --file infrastructure/main.bicep
